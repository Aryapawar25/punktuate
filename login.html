<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punktuate Admin | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="admin.css">
</head>
<body class="min-h-screen bg-[#000B3D] flex items-center justify-center p-4">
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[60vw] h-[60vw] bg-blue-600/10 blur-[180px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] bg-[#D4AF37]/5 blur-[180px] rounded-full"></div>
    </div>
    
    <div class="relative z-10 w-full max-w-md">
        <div class="glass p-12 rounded-[40px] border border-white/10">
            <div class="text-center mb-12">
                <div class="flex justify-center mb-6">
                    <img src="17-removebg-preview.png" alt="Punktuate Logo" class="h-16 w-auto opacity-90">
                </div>
                <h1 class="text-4xl font-black uppercase tracking-tight mb-2">Admin Panel</h1>
                <p class="text-white/40 luxury-caption text-[11px] tracking-[0.2em]">punktuate administration</p>
            </div>
            
            <form id="loginForm" class="space-y-8">
                <div>
                    <label class="text-white/60 luxury-caption text-[10px] uppercase tracking-[0.15em] block mb-3">Username</label>
                    <div class="glass border border-white/10 rounded-[20px] p-5 flex items-center gap-4 transition-all duration-300 focus-within:border-[#D4AF37]/50">
                        <i class="bx bx-user text-[#D4AF37] text-xl"></i>
                        <input type="text" id="username" required class="flex-1 bg-transparent border-0 outline-none text-white placeholder-white/30 font-medium" placeholder="Enter admin username">
                    </div>
                </div>
                
                <div>
                    <label class="text-white/60 luxury-caption text-[10px] uppercase tracking-[0.15em] block mb-3">Password</label>
                    <div class="glass border border-white/10 rounded-[20px] p-5 flex items-center gap-4 transition-all duration-300 focus-within:border-[#D4AF37]/50">
                        <i class="bx bx-lock text-[#D4AF37] text-xl"></i>
                        <input type="password" id="password" required class="flex-1 bg-transparent border-0 outline-none text-white placeholder-white/30 font-medium" placeholder="Enter admin password">
                    </div>
                </div>
                
                <div id="errorMessage" class="text-red-400 text-sm text-center hidden"></div>
                
                <button type="submit" class="w-full btn-hover bg-[#D4AF37] text-[#000B3D] px-10 py-5 rounded-[20px] luxury-caption text-[11px] font-extrabold uppercase tracking-[0.2em] shadow-2xl">
                    Sign In
                </button>
            </form>
            
            <div class="mt-8 text-center">
                <p class="text-white/30 text-sm">Back to <a href="index.html" class="text-[#D4AF37] hover:underline">Main Website</a></p>
            </div>
        </div>
    </div>
    
    <script src="login.js"></script>
</body>
</html>
